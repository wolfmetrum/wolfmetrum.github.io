---
layout: default
title: 首頁
---
<style>
  /* 抹除主題預設的累贅頁首 */
  header.site-header, .page-header { display: none !important; }
</style>

<div style="display: flex; align-items: center; margin-bottom: 40px; border-bottom: 2px solid #eee; padding-bottom: 20px;">
  <a href="{{ '/' | relative_url }}" style="display: block; margin-right: 20px; text-decoration: none;">
    <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Wolf Metrum Logo" style="max-width: 120px; height: auto; display: block;">
  </a>
  <a href="{{ '/' | relative_url }}" style="text-decoration: none; color: inherit;">
    <h1 style="margin: 0; font-size: 2.5em; font-weight: bold;">狼的格律 Wolf Metrum</h1>
  </a>
</div>

<h2>最新發布</h2>

<div style="display: flex; align-items: center; justify-content: center; margin-bottom: 30px; gap: 15px;">
  <button id="prev-video" style="background: none; border: none; font-size: 2em; cursor: pointer; color: #555;">&#10094;</button>
  <div id="video-container" style="flex-grow: 1; width: 100%; max-width: 800px; background: #111; aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center; color: #fff;">
    鎖定目標中...
  </div>
  <button id="next-video" style="background: none; border: none; font-size: 2em; cursor: pointer; color: #555;">&#10095;</button>
</div>

<hr style="margin: 30px 0;">

<h2>歌曲目錄</h2>

<div id="filter-buttons" style="margin-bottom: 20px;">
  <button class="filter-btn" data-filter="all" style="margin-right: 10px; padding: 5px 10px; cursor: pointer; font-weight: bold;">全部展示</button>
  </div>

<ul id="song-list">
  {% for song in site.songs %}
    <li class="song-item" data-tags="{{ song.tags | join: ',' }}" style
