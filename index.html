---
layout: default
title: 首頁
---

<div style="display: flex; align-items: center; margin-bottom: 40px; border-bottom: 2px solid #eee; padding-bottom: 20px;">
  <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Wolf Metrum Logo" style="max-width: 120px; height: auto; margin-right: 20px;">
  <h1 style="margin: 0; font-size: 2.5em; font-weight: bold;">狼的格律 Wolf Metrum</h1>
</div>

<h2>最新發布</h2>

<div style="display: flex; align-items: center; justify-content: center; margin-bottom: 30px; gap: 15px;">
  <button id="prev-video" style="background: none; border: none; font-size: 2em; cursor: pointer; color: #555;">&#10094;</button>
  <div id="video-container" style="flex-grow: 1; width: 100%; max-width: 800px; background: #111; aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center; color: #fff;">
    鎖定目標中...
  </div>
  <button id="next-video" style="background: none; border: none; font-size: 2em; cursor: pointer; color: #555;">&#10095;</button>
</div>

<hr style="margin: 30px 0;">

<h2>歌曲目錄</h2>

<div id="filter-buttons" style="margin-bottom: 20px;">
  <button class="filter-btn" data-filter="all" style="margin-right: 10px; padding: 5px 10px; cursor: pointer; font-weight: bold;">全部展示</button>
  </div>

<ul id="song-list">
  {% for song in site.songs %}
    <li class="song-item" data-tags="{{ song.tags | join: ',' }}" style="margin-bottom: 10px;">
      <a href="{{ song.url | relative_url }}" style="font-size: 1.1em; font-weight: bold;">{{ song.title }}</a>
      <span style="font-size: 0.8em; color: #666; margin-left: 10px;">[{{ song.tags | join: ', ' }}]</span>
    </li>
  {% endfor %}
</ul>

<script>
// === YouTube 最新三部影片輪播系統 ===
const channelId = 'UCqdp7Moy1guJ1UHCocdKFWQ'; 
const rssUrl = encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`);
const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

let latestVideos = [];
let currentVidIndex = 0;

fetch(apiUrl)
  .then(res => res.json())
  .then(data => {
    if(data.items && data.items.length > 0) {
      // 擷取最新的三部影片 ID
      latestVideos = data.items.slice(0, 3).map(item => item.link.split('v=')[1]);
      renderVideo();
    } else {
      document.getElementById('video-container').innerHTML = "目前沒有獵物蹤跡。";
    }
  });

function renderVideo() {
  if(latestVideos.length === 0) return;
  const videoId = latestVideos[currentVidIndex];
  document.getElementById('video-container').innerHTML = `
    <iframe style="width: 100%; aspect-ratio: 16 / 9;" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
  `;
}

// 左右切換行動邏輯
document.getElementById('prev-video').addEventListener('click', () => {
  if(latestVideos.length > 0) {
    // 循環切換：當索引小於0時，回到最後一個
    currentVidIndex = (currentVidIndex - 1 + latestVideos.length) % latestVideos.length;
    renderVideo();
  }
});

document.getElementById('next-video').addEventListener('click', () => {
  if(latestVideos.length > 0) {
    // 循環切換：當索引超過長度時，回到第一個
    currentVidIndex = (currentVidIndex + 1) % latestVideos.length;
    renderVideo();
  }
});


// === 目錄自動分類與過濾系統 ===
document.addEventListener("DOMContentLoaded", () => {
  const songItems = document.querySelectorAll('.song-item');
  const filterContainer = document.getElementById('filter-buttons');
  const allTags = new Set();

  songItems.forEach(item => {
    const tags = item.getAttribute('data-tags').split(',');
    tags.forEach(tag => {
      const cleanTag = tag.trim();
      if(cleanTag) allTags.add(cleanTag);
    });
  });

  allTags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.setAttribute('data-filter', tag);
    btn.innerText = tag;
    btn.style.marginRight = '10px';
    btn.style.padding = '5px 10px';
    btn.style.cursor = 'pointer';
    filterContainer.appendChild(btn);
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(b => b.style.fontWeight = 'normal');
      this.style.fontWeight = 'bold';
      
      const targetTag = this.getAttribute('data-filter');

      songItems.forEach(item => {
        if (targetTag === 'all') {
          item.style.display = 'list-item';
        } else {
          const itemTags = item.getAttribute('data-tags').split(',').map(t => t.trim());
          if (itemTags.includes(targetTag)) {
            item.style.display = 'list-item';
          } else {
            item.style.display = 'none';
          }
        }
      });
    });
  });
});
</script>
